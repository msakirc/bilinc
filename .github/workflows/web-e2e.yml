name: web-e2e

on:
  push:
    branches: [main]
    paths: ["web/**", "i18n/**", ".github/workflows/web-e2e.yml"]
  pull_request:
    paths: ["web/**", "i18n/**", ".github/workflows/web-e2e.yml"]

jobs:
  playwright:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: next-${{ hashFiles('web/**/*.[jt]s', 'web/**/*.[jt]sx') }}
          restore-keys: next-

      - run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: "1"
          # Build needs Supabase public keys to compile/run. Set these as repo
          # secrets pointing at a DISPOSABLE/staging project, never paused prod.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          # AWS catalog/search — public unauth client config (same as mobile/.env).
          NEXT_PUBLIC_AWS_REGION: eu-central-1
          NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID: eu-central-1:cf66e6b8-e288-46b1-8f74-e9f32bf497d5
          NEXT_PUBLIC_DYNAMODB_TABLE: bilinc-catalog
          NEXT_PUBLIC_SEARCH_URL: https://2ljm4c7rf7y5gkwsaqy6qpfm5e0skqtj.lambda-url.eu-central-1.on.aws/
          # Optional — enable the DB-dependent specs when a seeded project exists:
          # E2E_USER / E2E_PASS  -> login flow
          # E2E_LIVE_DATA=1      -> search result-list assertions
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
          # Low-rep seed — rep-gate flow + persistent authed session (activity).
          E2E_LOWREP_USER: ${{ secrets.E2E_LOWREP_USER }}
          E2E_LOWREP_PASS: ${{ secrets.E2E_LOWREP_PASS }}

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14
