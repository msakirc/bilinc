# Bug-lock: user with reputation < 100 cannot report a fact.
# The screen shows the reputation notice and the submit button is disabled.
appId: ${APP_ID}
---
- runFlow:
    file: _login.yaml
    env:
      USERNAME: ${LOWREP_USER}
      PASSWORD: ${LOWREP_PASS}
- runFlow: _open-business.yaml
# report-fact button is below the fold on the detail screen
- scrollUntilVisible:
    element:
      id: "business-report-fact"
    direction: DOWN
    visibilityPercentage: 20
    waitToSettleTimeoutMs: 1000
- tapOn:
    id: "business-report-fact"
# Rep-gate notice must be visible for a sub-100 user.
- assertVisible: ".*en az 100 itibar puanı gereklidir.*"
# Fill the form and confirm submit does NOT navigate away (button disabled).
- tapOn:
    id: "fact-statement"
# Maestro inputText is ASCII-only (mobile-dev-inc/maestro#146) -> no ç/ş/ğ.
- inputText: "E2E gercek bildirimi denemesi."
- hideKeyboard
# Guarantee checkbox + submit sit below evidence/category cards -> scroll first.
- scrollUntilVisible:
    element:
      id: "fact-truth-guarantee"
    direction: DOWN
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 1000
- tapOn:
    id: "fact-truth-guarantee"
- scrollUntilVisible:
    element:
      id: "fact-submit"
    direction: DOWN
    visibilityPercentage: 50
    waitToSettleTimeoutMs: 1000
- tapOn:
    id: "fact-submit"
# Submit is disabled for a sub-100 user -> tapping does nothing: we stay on the
# fact form (submit still visible) and are NOT navigated back to the detail
# screen. (The rep notice itself is now scrolled above the fold, so assert on
# the form's presence + absence of the detail screen instead.)
- assertVisible:
    id: "fact-submit"
- assertNotVisible:
    id: "business-write-review"
