# Profile -> Notification preferences screen renders and saving persists
# (AsyncStorage) -> success alert. Locks the settings/notifications route.
appId: ${APP_ID}
---
- runFlow:
    file: _login.yaml
    env:
      USERNAME: ${SEED_USER}
      PASSWORD: ${SEED_PASS}
- tapOn: "Profil"
- scrollUntilVisible:
    element:
      text: "Bildirim Tercihleri"
    direction: DOWN
    visibilityPercentage: 40
    centerElement: true
    waitToSettleTimeoutMs: 1000
- tapOn: "Bildirim Tercihleri"
- assertVisible: "Bildirim Türleri"
- scrollUntilVisible:
    element:
      text: "Kaydet"
    direction: DOWN
    waitToSettleTimeoutMs: 1000
- tapOn: "Kaydet"
- assertVisible: "Kaydedildi"
- tapOn: "Tamam|OK"
