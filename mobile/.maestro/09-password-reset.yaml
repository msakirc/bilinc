# Security-question password reset: username -> verify answers -> reach the
# new-password step. NON-DESTRUCTIVE: stops before submitting step 3 so the
# seeded user's password is never changed (flow stays re-runnable).
# Seed: RESET_USER with 2 security answers both set to ${RESET_ANSWER}.
appId: ${APP_ID}
---
- runFlow: _launch.yaml
- scrollUntilVisible:
    element:
      text: "Zaten hesabın var mı? Giriş Yap"
    direction: DOWN
    visibilityPercentage: 20
    centerElement: true
    waitToSettleTimeoutMs: 1000
- tapOn: "Zaten hesabın var mı? Giriş Yap"
- tapOn:
    id: "login-forgot"
# Step 1 — username
- assertVisible: "Şifrenizi Sıfırlayın"
- tapOn:
    id: "reset-username"
- inputText: ${RESET_USER}
- hideKeyboard
- tapOn:
    id: "reset-step1-submit"
# Step 2 — answer the TWO security questions (app uses 2; seed both = ${RESET_ANSWER})
- assertVisible: "Kimliğinizi Doğrulayın"
- tapOn:
    id: "reset-answer-0"
- inputText: ${RESET_ANSWER}
- tapOn:
    id: "reset-answer-1"
- inputText: ${RESET_ANSWER}
- hideKeyboard
- tapOn:
    id: "reset-step2-submit"
# Step 3 reached -> identity verified. Stop here (no submit = no password change).
- assertVisible: "Yeni Şifre Oluşturun"
- assertVisible:
    id: "reset-new-password"
