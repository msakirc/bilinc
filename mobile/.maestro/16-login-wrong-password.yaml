# Bug-lock: wrong credentials surface the "login failed" alert and keep the
# user on the login screen (no session). Non-destructive (auth rejects it).
appId: ${APP_ID}
---
- runFlow: _launch.yaml
- scrollUntilVisible:
    element:
      text: "Zaten hesabın var mı? Giriş Yap"
    direction: DOWN
    visibilityPercentage: 20
    centerElement: true
    waitToSettleTimeoutMs: 1000
- tapOn: "Zaten hesabın var mı? Giriş Yap"
- tapOn:
    id: "login-username"
- inputText: ${SEED_USER}
- tapOn:
    id: "login-password"
- inputText: "WrongPass99x"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "login-submit"
    direction: DOWN
    waitToSettleTimeoutMs: 1000
- tapOn:
    id: "login-submit"
# Auth failure alert shown -> the login was rejected, so we never reached the
# Home tab. (Asserting absence of "Ana Sayfa" needs no alert dismissal.)
- assertVisible: "Giriş Başarısız"
- assertNotVisible: "Ana Sayfa"
